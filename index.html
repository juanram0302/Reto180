<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0E1113">
<title>RETO 180 — Transformación Total</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0E1113; --surface:#171C1F; --surface2:#1F2529; --line:#2A3236;
  --gold:#F5B93F; --gold-dim:#8a6a24; --green:#3FB950; --green-dim:#1d4a28;
  --red:#E5534B; --blue:#58A6FF; --text:#E8EAED; --muted:#8B949E;
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  background:var(--bg); color:var(--text);
  font-family:'Inter',system-ui,sans-serif; font-size:15px; line-height:1.5;
  padding-bottom:84px; min-height:100vh;
}
.bebas{font-family:'Bebas Neue',sans-serif; letter-spacing:.04em}
.mono{font-family:'JetBrains Mono',monospace}

header{
  padding:18px 18px 10px; display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; background:linear-gradient(var(--bg) 75%,transparent); z-index:40;
}
.logo{font-family:'Bebas Neue'; font-size:26px; letter-spacing:.06em}
.logo em{color:var(--gold); font-style:normal}
.streak-pill{
  display:flex; align-items:center; gap:6px; background:var(--surface);
  border:1px solid var(--line); border-radius:99px; padding:6px 14px;
  font-family:'JetBrains Mono'; font-weight:700; font-size:15px;
}
.streak-pill.hot{border-color:var(--gold); box-shadow:0 0 18px rgba(245,185,63,.18)}

main{padding:0 16px; max-width:560px; margin:0 auto}

.card{
  background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
  padding:16px; margin-bottom:14px;
}
.card h2{font-family:'Bebas Neue'; font-size:21px; letter-spacing:.05em; margin-bottom:4px}
.card .sub{color:var(--muted); font-size:13px; margin-bottom:12px}
.eyebrow{
  font-family:'JetBrains Mono'; font-size:11px; font-weight:700; letter-spacing:.14em;
  text-transform:uppercase; color:var(--gold); margin-bottom:6px;
}

.hero{
  background:linear-gradient(150deg,#1a2024,#12161a 60%);
  border:1px solid var(--line); border-radius:var(--radius); padding:20px 16px; margin-bottom:14px;
  position:relative; overflow:hidden;
}
.hero::after{
  content:''; position:absolute; right:-40px; top:-40px; width:160px; height:160px;
  background:radial-gradient(circle,rgba(245,185,63,.12),transparent 70%);
}
.hero .day-label{font-family:'JetBrains Mono'; font-size:12px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase}
.hero h1{font-family:'Bebas Neue'; font-size:42px; line-height:1; margin:6px 0 2px}
.hero h1 span{color:var(--gold)}
.hero .phase-line{font-size:13px; color:var(--muted)}
.hero .phase-line b{color:var(--text)}
.kpis{display:flex; gap:10px; margin-top:14px}
.kpi{flex:1; background:rgba(255,255,255,.04); border:1px solid var(--line); border-radius:10px; padding:10px 8px; text-align:center}
.kpi .v{font-family:'Bebas Neue'; font-size:24px; color:var(--gold)}
.kpi .l{font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em}

/* ===== EJERCICIOS (modo entrenador) ===== */
.ex-item{border-bottom:1px solid var(--line); padding:4px 0}
.ex-item:last-child{border-bottom:none}
.ex-head{display:flex; align-items:center; gap:11px; padding:10px 4px; cursor:pointer; user-select:none}
.ex-head .box{
  width:25px; height:25px; min-width:25px; border-radius:7px; border:2px solid var(--muted);
  display:flex; align-items:center; justify-content:center; font-size:14px; transition:all .15s;
}
.ex-item.done .box{background:var(--green); border-color:var(--green); color:#04140a}
.ex-item.done .ex-name{text-decoration:line-through; opacity:.5}
.ex-info{flex:1; min-width:0}
.ex-name{font-weight:600; font-size:14px; line-height:1.3}
.ex-meta{display:flex; gap:6px; margin-top:3px; flex-wrap:wrap}
.badge{
  font-family:'JetBrains Mono'; font-size:11.5px; font-weight:700; padding:2px 8px;
  border-radius:6px; white-space:nowrap;
}
.badge.reps{color:var(--muted); background:rgba(139,148,158,.1); border:1px solid rgba(139,148,158,.25)}
.badge.wrec{color:var(--gold); background:rgba(245,185,63,.1); border:1px solid rgba(245,185,63,.3)}
.badge.up{color:var(--green); background:rgba(63,185,80,.1); border:1px solid rgba(63,185,80,.3)}
.chev{color:var(--muted); font-size:12px; transition:transform .2s; padding:4px}
.ex-item.open .chev{transform:rotate(180deg)}

.coach{display:none; padding:2px 4px 14px 40px}
.ex-item.open .coach{display:block; animation:fadein .2s ease}
.coach-block{background:var(--surface2); border:1px solid var(--line); border-radius:10px; padding:12px; margin-bottom:8px}
.coach-block .ct{font-family:'JetBrains Mono'; font-size:10.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; margin-bottom:6px}
.ct.tec{color:var(--blue)} .ct.avi{color:var(--red)} .ct.pro{color:var(--gold)}
.coach-block ul{list-style:none}
.coach-block li{font-size:13px; color:#c6cdd4; padding:3px 0 3px 16px; position:relative}
.coach-block li::before{content:'▸'; position:absolute; left:0; color:var(--blue)}
.coach-block.avi-b li::before{content:'⚠'; font-size:11px; color:var(--red)}
.coach-block p{font-size:13px; color:#c6cdd4}

.fb-row{display:flex; gap:7px; margin-top:4px}
.fb-btn{
  flex:1; border:1px solid var(--line); background:var(--surface2); color:var(--text);
  border-radius:9px; padding:9px 4px; font-family:'Inter'; font-weight:600; font-size:11.5px;
  cursor:pointer; transition:all .15s; line-height:1.25;
}
.fb-btn small{display:block; color:var(--muted); font-weight:500; font-size:10px}
.fb-btn.sel-up{border-color:var(--green); background:rgba(63,185,80,.12)}
.fb-btn.sel-same{border-color:var(--blue); background:rgba(88,166,255,.12)}
.fb-btn.sel-down{border-color:var(--red); background:rgba(229,83,75,.12)}

/* ===== TIMER DESCANSO ===== */
#restBar{
  position:fixed; left:12px; right:12px; bottom:78px; z-index:60;
  background:linear-gradient(135deg,#1d2939,#16202b); border:1px solid var(--blue);
  border-radius:14px; padding:12px 16px; display:flex; align-items:center; gap:14px;
  box-shadow:0 8px 30px rgba(0,0,0,.5); max-width:536px; margin:0 auto;
}
#restBar .t{font-family:'Bebas Neue'; font-size:34px; color:var(--blue); min-width:74px; line-height:1}
#restBar .lbl{flex:1; font-size:12.5px; color:var(--muted)}
#restBar .lbl b{color:var(--text); display:block; font-size:13.5px}
#restBar button{
  background:var(--surface2); border:1px solid var(--line); color:var(--text);
  border-radius:9px; padding:8px 14px; font-weight:600; font-size:12.5px; cursor:pointer;
}
#restBar .ring{height:4px; position:absolute; left:0; bottom:0; background:var(--blue); border-radius:0 0 0 14px; transition:width 1s linear}

.check-item{
  display:flex; align-items:center; gap:12px; padding:12px 10px;
  border-bottom:1px solid var(--line); cursor:pointer; user-select:none;
}
.check-item:last-child{border-bottom:none}
.check-item .box{
  width:24px; height:24px; min-width:24px; border-radius:7px; border:2px solid var(--muted);
  display:flex; align-items:center; justify-content:center; font-size:14px; transition:all .15s;
}
.check-item.done .box{background:var(--green); border-color:var(--green); color:#04140a}
.check-item.done .name{text-decoration:line-through; opacity:.45}
.check-item .info{flex:1}
.check-item .name{font-weight:600; font-size:14.5px}
.check-item .detail{font-size:12.5px; color:var(--muted)}
.check-item .reps{
  font-family:'JetBrains Mono'; font-size:11px; font-weight:700; color:var(--gold);
  background:rgba(245,185,63,.08); border:1px solid rgba(245,185,63,.25);
  padding:4px 8px; border-radius:7px; white-space:nowrap;
}

.pbar{height:8px; background:var(--surface2); border-radius:99px; overflow:hidden; margin-top:8px}
.pbar>div{height:100%; background:linear-gradient(90deg,var(--gold),#ffd97a); border-radius:99px; transition:width .35s ease}
.pbar.green>div{background:linear-gradient(90deg,#2ea043,var(--green))}

.water-row{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}
.glass{
  width:38px; height:46px; border:2px solid var(--line); border-radius:6px 6px 10px 10px;
  display:flex; align-items:flex-end; justify-content:center; cursor:pointer;
  font-size:16px; padding-bottom:4px; transition:all .15s; background:var(--surface2);
}
.glass.full{border-color:var(--blue); background:linear-gradient(180deg,transparent 25%,rgba(88,166,255,.35))}

.seg{display:flex; background:var(--surface2); border-radius:10px; padding:4px; margin-bottom:10px}
.seg button{
  flex:1; background:none; border:none; color:var(--muted); font-family:'Inter'; font-weight:600;
  font-size:13px; padding:8px; border-radius:8px; cursor:pointer; transition:all .15s;
}
.seg button.active{background:var(--gold); color:#1a1206}

.btn{
  display:block; width:100%; border:none; border-radius:12px; padding:15px;
  font-family:'Bebas Neue'; font-size:20px; letter-spacing:.08em; cursor:pointer;
  transition:transform .12s, box-shadow .2s;
}
.btn:active{transform:scale(.98)}
.btn-gold{background:linear-gradient(135deg,var(--gold),#ffce5c); color:#1a1206; box-shadow:0 4px 22px rgba(245,185,63,.25)}
.btn-ghost{background:var(--surface2); color:var(--muted); border:1px solid var(--line); font-size:16px}
.btn-row{display:flex; gap:10px}
.btn-row .btn{flex:1}

.heatmap-wrap{overflow-x:auto; padding-bottom:6px}
.heatmap{display:grid; grid-template-rows:repeat(7,13px); grid-auto-flow:column; grid-auto-columns:13px; gap:3px}
.hm-cell{width:13px; height:13px; border-radius:3px; background:var(--surface2); border:1px solid rgba(255,255,255,.04)}
.hm-cell.done{background:var(--green); border-color:transparent}
.hm-cell.excused{background:#b58a1f; border-color:transparent}
.hm-cell.failed{background:var(--red); border-color:transparent}
.hm-cell.today{outline:2px solid var(--gold); outline-offset:1px}
.hm-cell.future{opacity:.35}
.legend{display:flex; gap:14px; margin-top:10px; font-size:12px; color:var(--muted); flex-wrap:wrap}
.legend span{display:flex; align-items:center; gap:5px}
.dot{width:11px; height:11px; border-radius:3px; display:inline-block}

.stats3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px}
.stat-box{background:var(--surface2); border:1px solid var(--line); border-radius:10px; padding:12px 8px; text-align:center}
.stat-box .v{font-family:'Bebas Neue'; font-size:28px}
.stat-box .l{font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em}
.v.gold{color:var(--gold)} .v.green{color:var(--green)} .v.red{color:var(--red)} .v.blue{color:var(--blue)}

.rule{display:flex; gap:10px; padding:9px 0; border-bottom:1px solid var(--line); font-size:13.5px; align-items:flex-start}
.rule:last-child{border:none}
.rule .n{font-family:'Bebas Neue'; color:var(--gold); font-size:18px; min-width:22px; line-height:1.3}

table{width:100%; border-collapse:collapse; font-size:13px}
th{font-family:'JetBrains Mono'; font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); text-align:left; padding:7px 6px; border-bottom:1px solid var(--line)}
td{padding:8px 6px; border-bottom:1px solid rgba(255,255,255,.05); vertical-align:top}
tr:last-child td{border:none}
td b{color:var(--gold)}

canvas{width:100%; height:170px}

.input-row{display:flex; gap:10px; margin-top:10px}
.input-row input{
  flex:1; background:var(--surface2); border:1px solid var(--line); border-radius:10px;
  color:var(--text); font-family:'JetBrains Mono'; font-size:15px; padding:12px; text-align:center;
}
.input-row input:focus{outline:none; border-color:var(--gold)}
.input-row .btn{width:auto; padding:12px 20px; font-size:16px}

nav{
  position:fixed; bottom:0; left:0; right:0; background:rgba(14,17,19,.92);
  backdrop-filter:blur(14px); border-top:1px solid var(--line); display:flex; z-index:50;
  padding-bottom:env(safe-area-inset-bottom);
}
nav button{
  flex:1; background:none; border:none; color:var(--muted); padding:10px 4px 12px;
  font-family:'Inter'; font-size:10.5px; font-weight:600; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:3px; letter-spacing:.03em;
}
nav button .ico{font-size:20px; line-height:1}
nav button.active{color:var(--gold)}

.modal-bg{
  position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center; z-index:100; padding:20px;
}
.modal{background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:24px 20px; max-width:420px; width:100%; max-height:85vh; overflow-y:auto}
.modal h3{font-family:'Bebas Neue'; font-size:26px; letter-spacing:.05em; margin-bottom:8px}
.modal p{color:var(--muted); font-size:14px; margin-bottom:16px}
.hidden{display:none !important}

.medal{text-align:center; padding:10px 0 4px}
.medal .ico{font-size:56px; display:block; animation:pop .5s cubic-bezier(.2,1.6,.4,1)}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}

.page{display:none; animation:fadein .25s ease}
.page.active{display:block}
@keyframes fadein{from{opacity:0; transform:translateY(6px)}to{opacity:1; transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none !important; transition:none !important}}

details summary{cursor:pointer; font-weight:600; padding:8px 0; list-style:none; display:flex; justify-content:space-between; align-items:center}
details summary::after{content:'+'; color:var(--gold); font-size:18px}
details[open] summary::after{content:'–'}
.food-list{font-size:13.5px; color:var(--muted); padding:4px 0 10px}
.food-list li{margin-left:18px; margin-bottom:4px}
.tag-ok{color:var(--green); font-weight:700}
.tag-no{color:var(--red); font-weight:700}
.small-link{background:none;border:none;color:var(--muted);font-size:12px;text-decoration:underline;cursor:pointer;font-family:'Inter'}
.coach-note{
  background:rgba(88,166,255,.07); border:1px solid rgba(88,166,255,.3); border-radius:10px;
  padding:10px 12px; font-size:12.5px; color:#b8cfe8; margin-bottom:12px;
}
</style>
</head>
<body>

<header>
  <div class="logo">RETO<em>180</em> 🔥</div>
  <div class="streak-pill" id="streakPill">🔥 <span id="streakNum">0</span></div>
</header>

<main>
  <div class="page active" id="page-hoy"></div>
  <div class="page" id="page-reto"></div>
  <div class="page" id="page-progreso"></div>
  <div class="page" id="page-plan"></div>
</main>

<div id="restBar" class="hidden">
  <div class="t" id="restT">1:30</div>
  <div class="lbl"><b>Descansando 🧘</b>Respira, hidrátate y prepara la próxima serie</div>
  <button onclick="stopRest()">Listo</button>
  <div class="ring" id="restRing" style="width:100%"></div>
</div>

<nav>
  <button data-page="hoy" class="active"><span class="ico">⚡</span>HOY</button>
  <button data-page="reto"><span class="ico">🟩</span>RETO</button>
  <button data-page="progreso"><span class="ico">📈</span>PROGRESO</button>
  <button data-page="plan"><span class="ico">📋</span>PLAN</button>
</nav>

<div class="modal-bg hidden" id="modalBg"><div class="modal" id="modalBox"></div></div>

<script>
/* ================================================================
   RETO 180 v2 — MODO ENTRENADOR
   Pesos progresivos automáticos + técnica + timer de descanso
================================================================ */

// E(nombre, reps, pesoInicial lb (null=peso corporal), incremento lb, descanso seg, [técnica], aviso lesión)
function E(n,r,w0,inc,rest,tips,warn){ return {n,r,w0,inc,rest,tips,warn}; }

const WORKOUTS = {
  1:{ name:'PECHO + TRÍCEPS', color:'#58A6FF', ex:[
    E('Press banca plano con barra','4 × 6–8',95,5,150,
      ['Retrae los omóplatos y pégalos al banco todo el set','Baja la barra controlada a la línea de los pezones','Pies firmes en el piso, ligero arco natural en la espalda baja','Empuja como si quisieras doblar la barra'],
      'Nunca rebotes la barra en el pecho ni levantes los glúteos del banco. Usa seguros o spotter en series pesadas.'),
    E('Press inclinado con mancuernas','4 × 8–10',35,5,120,
      ['Banco a 30–45°, no más inclinado','Baja las mancuernas hasta sentir estiramiento en el pecho','Codos a ~45° del torso, no abiertos a 90°','Arriba junta las mancuernas sin chocarlas'],
      'No uses un peso que te haga arquear la espalda para empujar. Sube las mancuernas con las rodillas al posicionarte.'),
    E('Aperturas en pec deck o cables','3 × 12–15',50,10,90,
      ['Codos ligeramente flexionados y FIJOS todo el movimiento','Abre solo hasta donde sientas estiramiento cómodo','Aprieta el pecho 1 segundo al cerrar','Movimiento lento: 2 seg abrir, 2 seg cerrar'],
      'No abras de más: el hombro es vulnerable en máxima apertura con carga.'),
    E('Fondos en paralelas','3 × 8–12',null,0,120,
      ['Inclina el torso hacia adelante para enfocar pecho','Baja hasta que el hombro quede a la altura del codo, no más','Codos apuntando hacia atrás, no abiertos','Si no llegas a 8, usa la máquina asistida'],
      'Si sientes pinchazo en el hombro al bajar profundo, reduce el rango. Dominado = agrega reps, luego lastre.'),
    E('Press francés con barra Z','3 × 10–12',40,5,90,
      ['Codos apuntando al techo, quietos como columnas','Baja la barra a la frente o justo detrás','Solo se mueve el antebrazo','Agarre cerrado en la parte angulada de la Z'],
      'Si duelen los codos, cambia a extensión en polea con cuerda ese día.'),
    E('Extensión de tríceps en polea (cuerda)','3 × 12–15',40,5,60,
      ['Codos pegados al cuerpo, no se mueven','Abre la cuerda al final y aprieta 1 seg','Torso ligeramente inclinado, core firme','No uses impulso del hombro'],
      'El peso lo mueve el tríceps, no el cuerpo. Si te balanceas, baja el peso.'),
    E('Abs: crunch en polea alta','3 × 15',50,10,60,
      ['De rodillas, cuerda a los lados de la cabeza','Enrolla el torso llevando codos a las rodillas','Exhala fuerte al bajar, aprieta el abdomen','La cadera no se mueve: solo la columna se flexiona'],
      'No jales con los brazos: son solo ganchos.'),
  ]},
  2:{ name:'ESPALDA + BÍCEPS', color:'#3FB950', ex:[
    E('Dominadas (o jalón al pecho)','4 × 6–10',null,0,150,
      ['Agarre un poco más ancho que los hombros','Inicia el jalón bajando los omóplatos, no doblando brazos','Pecho hacia la barra, no la barbilla estirada','Baja controlado hasta casi extender los brazos'],
      'Si no sacas 6 dominadas limpias, usa jalón al pecho (empieza ~100 lb) hasta ganar fuerza.'),
    E('Remo con barra','4 × 8–10',85,10,150,
      ['Torso inclinado ~45°, espalda RECTA como tabla','Jala la barra al ombligo, codos rozando el cuerpo','Aprieta los omóplatos atrás en cada rep','Rodillas semiflexionadas, core apretado'],
      'La espalda redondeada con peso es la lesión #1 del gym. Si se redondea, baja el peso YA.'),
    E('Remo en polea baja (agarre cerrado)','3 × 10–12',80,10,90,
      ['Pecho arriba, hombros atrás','Jala el agarre al abdomen bajo','No te mezas hacia atrás: el torso casi no se mueve','Estira adelante controlado sin encorvar'],
      'El impulso con la espalda baja te roba el ejercicio y arriesga lumbar.'),
    E('Pullover en polea alta','3 × 12–15',45,5,60,
      ['Brazos casi rectos, codos fijos','Lleva la barra del frente hasta los muslos en arco','Siente el dorsal estirar arriba y apretar abajo','Torso inclinado ligeramente adelante'],
      'Es un ejercicio de sensación: peso moderado, técnica perfecta.'),
    E('Curl con barra','3 × 8–10',40,5,90,
      ['Codos pegados a los costados, no viajan adelante','Sube sin balancear el cuerpo','Baja en 2–3 segundos: ahí crece el bíceps','Muñecas rectas, no dobladas'],
      'El balanceo de cadera es peso robado. Espalda a la pared si haces trampa.'),
    E('Curl martillo con mancuernas','3 × 10–12',20,5,60,
      ['Palmas enfrentadas todo el movimiento','Alterna o simultáneo, sin impulso','Aprieta arriba 1 segundo','Trabaja braquial: dará grosor al brazo'],
      'Peso por mancuerna. Controla la bajada siempre.'),
    E('Abs: elevación de piernas colgado','3 × 12',null,0,60,
      ['Colgado de la barra, sube las rodillas al pecho','Enrosca la pelvis al final: ahí está la magia','Baja lento sin columpiarte','Si es muy duro: rodillas flexionadas; muy fácil: piernas rectas'],
      'Si te columpias, pausa 1 seg colgado entre reps.'),
  ]},

function todayKey(d = new Date()){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function parseKey(k){ const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); }
function dayNumber(k = todayKey()){ return Math.floor((parseKey(k) - parseKey(S.start)) / 86400000) + 1; }
function currentMonth(){ return Math.min(6, Math.max(1, Math.ceil(dayNumber()/30))); }
function currentPhase(){ const m = currentMonth(); return PHASES.findIndex(p=>p.m.includes(m)); }
function getDay(k = todayKey()){ if(!S.days[k]) S.days[k] = freshDay(); return S.days[k]; }

// ---------- MOTOR DE PROGRESIÓN (el entrenador) ----------
// Recomienda peso por ejercicio; sube automático al dominarlo.
function recWeight(ex){
  if(ex.w0===null) return null; // peso corporal
  const p = S.prog[ex.n];
  return p ? p.w : ex.w0;
}
function recLabel(ex){
  const w = recWeight(ex);
  if(w===null){
    const p = S.prog[ex.n];
    const bonus = p ? p.bonus||0 : 0;
    return bonus>0 ? `PC +${bonus} rep${bonus>1?'s':''}` : 'Peso corporal';
  }
  return `🎯 ${w} lb`;
}
function applyFeedback(ex, kind){
  if(!S.prog[ex.n]) S.prog[ex.n] = ex.w0===null ? {w:null, bonus:0} : {w:ex.w0};
  const p = S.prog[ex.n];
  if(ex.w0===null){
    if(kind==='up') p.bonus = (p.bonus||0)+1;
    if(kind==='down') p.bonus = Math.max(0,(p.bonus||0)-1);
  } else {
    if(kind==='up') p.w = +(p.w + ex.inc).toFixed(1);
    if(kind==='down') p.w = Math.max(+(p.w - ex.inc).toFixed(1), Math.max(5, ex.w0*0.6));
  }
  save();
}

// ---------- RACHA ----------
function computeStreak(){
  let streak = 0;
  const t = new Date();
  for(let i=0;;i++){
    const d = new Date(t); d.setDate(t.getDate()-i);
    const k = todayKey(d);
    if(parseKey(k) < parseKey(S.start)) break;
    const rec = S.days[k];
    if(i===0 && (!rec || !rec.status)) continue;
    if(rec && (rec.status==='done' || rec.status==='excused')){ if(rec.status==='done') streak++; else continue; }
    else break;
  }
  return streak;
}
function stats(){
  let done=0, excused=0, failed=0;
  for(const k in S.days){
    const s = S.days[k].status;
    if(s==='done') done++; else if(s==='excused') excused++; else if(s==='failed') failed++;
  }
  return {done, excused, failed};
}

// ---------- TIMER DE DESCANSO ----------
let restInt = null, restTotal = 0, restLeft = 0;
function startRest(sec){
  if(!sec) return;
  stopRest();
  restTotal = sec; restLeft = sec;
  document.getElementById('restBar').classList.remove('hidden');
  paintRest();
  restInt = setInterval(()=>{
    restLeft--;
    if(restLeft<=0){ beep(); stopRest(); return; }
    paintRest();
  },1000);
}
function paintRest(){
  const m = Math.floor(restLeft/60), s = restLeft%60;
  document.getElementById('restT').textContent = m+':'+String(s).padStart(2,'0');
  document.getElementById('restRing').style.width = (restLeft/restTotal*100)+'%';
}
function stopRest(){
  clearInterval(restInt); restInt = null;
  document.getElementById('restBar').classList.add('hidden');
}
function beep(){
  try{
    if(navigator.vibrate) navigator.vibrate([200,100,200]);
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880; g.gain.value = .15;
    o.start(); o.stop(ctx.currentTime + .35);
  }catch(e){}
}

    if(rec && rec.status) cls = rec.status==='done'?'done':(rec.status==='excused'?'excused':'failed');
    if(k===tk) cls += ' today';
    if(parseKey(k) > parseKey(tk)) cls += ' future';
    cells += `<div class="hm-cell ${cls}" title="Día ${i+1} · ${k}"></div>`;
  }
  const pct = Math.round(st.done/dn*100);

  let html = `

      <div class="stat-box"><div class="v gold">${st.excused}</div><div class="l">Justificados</div></div>
      <div class="stat-box"><div class="v red">${st.failed}</div><div class="l">Fallados</div></div>

    <div style="margin-top:14px; font-size:13px; color:var(--muted)">Tasa de cumplimiento</div>
    <div class="pbar green"><div style="width:${pct}%"></div></div>

  <div class="card">

// ---------- RENDER: PROGRESO ----------
function renderProgreso(){
  const ws = S.weights;
  const last = ws.length ? ws[ws.length-1].kg : null;
  const first = ws.length ? ws[0].kg : null;
  const lost = (first && last) ? (first-last).toFixed(1) : '0.0';
  const dn = dayNumber();
  const nextPhotoIn = 14 - ((Math.max(1,dn)-1) % 14);

  // fuerza: ejercicios con progresión registrada
  let strengthRows = '';
  const KEY_LIFTS = ['Press banca plano con barra','Sentadilla con barra','Peso muerto rumano con barra','Press militar (barra o mancuernas)','Remo con barra'];
  KEY_LIFTS.forEach(n=>{
    const p = S.prog[n];
    let w0 = null;
    for(const d in WORKOUTS){ const f = WORKOUTS[d].ex.find(e=>e.n===n); if(f){ w0=f.w0; break; } }
    const cur = p ? p.w : w0;
    const gain = cur - w0;
    strengthRows += `<tr><td>${n.split(' (')[0]}</td><td class="mono"><b>${cur} lb</b></td><td class="mono" style="color:${gain>0?'var(--green)':'var(--muted)'}">${gain>0?'+'+gain:gain===0?'—':gain} lb</td></tr>`;
  });

  let html = `
  <div class="card">
    <div class="eyebrow">PESO CORPORAL</div>
    <h2>Registro semanal</h2>
    <div class="sub">Pésate 3 veces/semana en ayunas y anota el promedio. Meta: −0.5 a −0.8 kg/semana.</div>
    <div class="stats3">
      <div class="stat-box"><div class="v blue">${first??'—'}</div><div class="l">Inicial kg</div></div>
      <div class="stat-box"><div class="v gold">${last??'—'}</div><div class="l">Actual kg</div></div>
      <div class="stat-box"><div class="v green">−${lost}</div><div class="l">Perdido kg</div></div>
    </div>
    <div class="input-row">
      <input type="number" step="0.1" id="wInput" placeholder="Peso de hoy (kg)">

    </div>
  </div>

  <div class="card">
    <div class="eyebrow">GRÁFICA</div>
    <h2>Tu curva de transformación</h2>
    <canvas id="chart" width="600" height="340"></canvas>
    ${ws.length===0?'<div class="sub" style="text-align:center;padding:20px 0">Registra tu primer peso para empezar la curva 📉</div>':''}
  </div>

  <div class="card">
    <div class="eyebrow">FUERZA · APRENDIDA POR EL ENTRENADOR</div>
    <h2>Tus levantamientos clave</h2>
    <div class="sub">La app sube estas cargas sola cada vez que marcas 💪 Dominado.</div>
    <table><tr><th>Ejercicio</th><th>Peso actual</th><th>Ganado</th></tr>${strengthRows}</table>
  </div>

  <div class="card">
    <div class="eyebrow">FOTO DE PROGRESO</div>
    <h2>📸 Próxima foto en ${nextPhotoIn} día${nextPhotoIn===1?'':'s'}</h2>
    <div class="sub">Cada 14 días: misma pose, misma luz, en ayunas. La pesa miente — la foto no.</div>
  </div>

  <div class="card">
    <div class="eyebrow">RUTA DE 6 MESES</div>
    <h2>Cronograma</h2>
    <table>
      <tr><th>Mes</th><th>Enfoque</th><th>Meta</th></tr>
      <tr><td><b>1</b></td><td>Técnica + hábito, forma perfecta</td><td>96→93 kg</td></tr>
      <tr><td><b>2</b></td><td>Subir pesos cada semana</td><td>93→90.5</td></tr>
      <tr><td><b>3</b></td><td>Déficit 2,150 · cardio firme</td><td>90.5→88</td></tr>
      <tr><td><b>4</b></td><td>Cargas máximas con buena forma</td><td>88→86</td></tr>
      <tr><td><b>5</b></td><td>Déficit 2,100 + refeed sabatino</td><td>86→85</td></tr>

    </table>
  </div>`;
  document.getElementById('page-progreso').innerHTML = html;
  if(ws.length) drawChart();
}

function drawChart(){
  const c = document.getElementById('chart'); if(!c) return;
  const ctx = c.getContext('2d');
  const ws = S.weights;
  ctx.clearRect(0,0,c.width,c.height);
  const pad = 42, W = c.width, H = c.height;
  const vals = ws.map(w=>w.kg);
  const min = Math.min(...vals, 84)-1, max = Math.max(...vals, 96)+1;
  const x = i => ws.length===1 ? W/2 : pad + i*(W-pad*1.4)/(ws.length-1);
  const y = v => H-pad - (v-min)/(max-min)*(H-pad*1.8);
  ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.lineWidth=1;
  ctx.fillStyle='#8B949E'; ctx.font='20px JetBrains Mono';
  for(let g=0; g<=4; g++){
    const gv = min + (max-min)*g/4, gy = y(gv);
    ctx.beginPath(); ctx.moveTo(pad,gy); ctx.lineTo(W-10,gy); ctx.stroke();
    ctx.fillText(gv.toFixed(1), 2, gy+6);
  }
  const my = y(84);
  ctx.strokeStyle='rgba(63,185,80,.5)'; ctx.setLineDash([6,6]);
  ctx.beginPath(); ctx.moveTo(pad,my); ctx.lineTo(W-10,my); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle='#3FB950'; ctx.fillText('META 84', W-130, my-8);
  ctx.strokeStyle='#F5B93F'; ctx.lineWidth=3; ctx.beginPath();
  ws.forEach((w,i)=>{ i===0?ctx.moveTo(x(i),y(w.kg)):ctx.lineTo(x(i),y(w.kg)); });
  ctx.stroke();
  ws.forEach((w,i)=>{
    ctx.fillStyle='#F5B93F'; ctx.beginPath(); ctx.arc(x(i),y(w.kg),5,0,7); ctx.fill();
    ctx.strokeStyle='#0E1113'; ctx.lineWidth=2; ctx.stroke();
  });
}

// ---------- ACCIONES ----------
function toggleOpen(i){ openEx = (openEx===i)? null : i; renderHoy(); }
function toggleEx(i,ev){
  ev.stopPropagation();
  const d = getDay();
  d.ex[i] = !d.ex[i];
  save();
  const dow = new Date().getDay();
  const e = WORKOUTS[dow].ex[i];
  if(d.ex[i] && e.rest>0) startRest(e.rest);
  if(d.ex[i] && !d.fb[i]) openEx = i; // abre el coach para pedir feedback
  renderHoy();
}
function giveFb(i,kind){
  const d = getDay();
  const dow = new Date().getDay();
  const e = WORKOUTS[dow].ex[i];
  // revertir feedback anterior si cambia de opinión
  if(d.fb[i] && d.fb[i]!==kind){
    const prev = d.fb[i];
    if(prev==='up') applyFeedback(e,'down'); // deshacer subida
    else if(prev==='down') applyFeedback(e,'up'); // deshacer bajada
  }
  if(d.fb[i]!==kind){
    d.fb[i] = kind;
    applyFeedback(e, kind);
  }
  save(); renderHoy();
}
function toggleMeal(i){ const d=getDay(); d.meals[i]=!d.meals[i]; save(); renderHoy(); }
function toggleCardio(){ const d=getDay(); d.cardio=!d.cardio; save(); renderHoy(); }
function setMealType(t){ const d=getDay(); d.mealType=t; save(); renderHoy(); }
function setWater(i){ const d=getDay(); d.water = (d.water===i+1)? i : i+1; save(); renderHoy(); }

function closeDay(status){
  const d = getDay();
  d.status = status; save();
  if(status==='done'){
    const streak = computeStreak();
    let msg = '¡Día sellado! Otro commit verde en tu historia.';
    if(streak>0 && streak%7===0) msg = `¡${streak} DÍAS SEGUIDOS! Una semana más de acero. 🏆`;
    if(streak>0 && streak%30===0) msg = `🏅 ¡${streak} DÍAS! Un mes completo de disciplina pura. Estás en otro nivel.`;
    showModal(`<div class="medal"><span class="ico">🔥</span></div>
      <h3 style="text-align:center">RACHA: ${streak}</h3>
      <p style="text-align:center">${msg}</p>
      <button class="btn btn-gold" onclick="hideModal()">SEGUIMOS 💪</button>`);
  }
  renderHoy(); renderReto();
}
function reopenDay(){ getDay().status = null; save(); renderHoy(); renderReto(); }

function addWeight(){
  const v = parseFloat(document.getElementById('wInput').value);
  if(!v || v<40 || v>250) return;
  S.weights.push({date: todayKey(), kg: v});
  save(); renderProgreso();
}

function exportData(){
  const blob = new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'reto180-respaldo-'+todayKey()+'.json';
  a.click();
}
function importData(){
  const inp = document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange = e => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = () => { try{ S = JSON.parse(r.result); if(!S.prog) S.prog={}; save(); renderAll(); }catch(err){ alert('Archivo inválido'); } };
    r.readAsText(f);
  };
  inp.click();
}

// ---------- MODAL / NAV ----------
function showModal(html){
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('modalBg').classList.remove('hidden');
}
function hideModal(){ document.getElementById('modalBg').classList.add('hidden'); }

document.querySelectorAll('nav button').forEach(b=>{
  b.onclick = () => {
    document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('page-'+b.dataset.page).classList.add('active');
    renderAll();
    window.scrollTo({top:0});
  };
});

function updateStreakPill(){
  const s = computeStreak();
  document.getElementById('streakNum').textContent = s;
  document.getElementById('streakPill').classList.toggle('hot', s>=3);
}

function renderAll(){ renderHoy(); renderReto(); renderProgreso(); renderPlan(); }

// ---------- ONBOARDING ----------
function init(){
  S = loadState();
  if(!S){
    showModal(`
      <div class="medal"><span class="ico">🔥</span></div>
      <h3 style="text-align:center">RETO 180</h3>
      <p style="text-align:center">180 días. Una meta. Cero excusas.<br>Ahora con <b style="color:var(--gold)">entrenador integrado</b>: pesos recomendados, técnica y progresión automática.</p>
      <p style="font-size:13px">Peso inicial (kg) — opcional:</p>
      <div class="input-row" style="margin-bottom:14px">
        <input type="number" step="0.1" id="startW" placeholder="96.0">
      </div>
      <button class="btn btn-gold" onclick="startChallenge()">🚀 EMPEZAR EL RETO</button>`);
    return;
  }
  if(!S.prog) S.prog = {};
  renderAll();
}
function startChallenge(){
  S = { start: todayKey(), days:{}, weights:[], prog:{} };
  const w = parseFloat(document.getElementById('startW').value);
  if(w && w>40 && w<250) S.weights.push({date: todayKey(), kg:w});
  save(); hideModal(); renderAll();
}
init();
</script>
